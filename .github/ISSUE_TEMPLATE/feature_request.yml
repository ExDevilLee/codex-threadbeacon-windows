name: 功能建议 / Feature Request
description: 描述真实使用问题及期望价值，而不只是控件或实现方式。
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        ThreadBeacon 的核心是让多个 Codex 任务状态一眼可见。请先描述问题，再描述方案。
        不要包含真实任务标题、会话内容、本机路径、state_5.sqlite、日志或凭据。

  - type: textarea
    id: problem
    attributes:
      label: 使用场景与问题 / Problem
    validations:
      required: true

  - type: textarea
    id: proposed_outcome
    attributes:
      label: 希望达到的结果 / Desired Outcome
      description: 描述成功体验，不要求指定技术实现。
    validations:
      required: true

  - type: textarea
    id: glanceable_value
    attributes:
      label: 对“一眼看懂状态”的帮助 / Glanceable Value
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已尝试的替代方法 / Alternatives Tried

  - type: dropdown
    id: data_scope
    attributes:
      label: 是否可能扩大数据或权限范围？ / Data Or Permission Scope
      options:
        - 否 / No
        - 可能需要新的本机只读数据 / New local read-only data may be needed
        - 可能需要网络、写入或系统权限 / Network, writes, or system permissions may be needed
        - 不确定 / Not sure
    validations:
      required: true

  - type: checkboxes
    id: privacy_confirmation
    attributes:
      label: 隐私确认 / Privacy Confirmation
      options:
        - label: 我没有提交真实任务标题、会话内容、本机路径、数据库、日志或凭据。
          required: true
